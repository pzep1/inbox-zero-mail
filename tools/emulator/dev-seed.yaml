google:
  users:
    - email: alpha.inbox@example.com
      name: Alpha Inbox
    - email: beta.inbox@example.com
      name: Beta Inbox
  oauth_clients:
    - client_id: inbox-zero-mail-dev
      client_secret: inbox-zero-google-secret
      redirect_uris:
        - inboxzeromail://oauth/google
        - http://localhost:4000/oauth/google
        - http://localhost:4002/oauth/google
        - http://localhost:4402/oauth/google
        - http://127.0.0.1/oauth/google
  labels:
    - id: Label_ops
      user_email: alpha.inbox@example.com
      name: Ops/Review
      color_background: "#DDEEFF"
      color_text: "#111111"
    - id: Label_customers
      user_email: alpha.inbox@example.com
      name: Customers
      color_background: "#E0F7EC"
      color_text: "#0F3D2E"
    - id: Label_newsletters
      user_email: alpha.inbox@example.com
      name: Newsletters
      color_background: "#F3E8FF"
      color_text: "#3D2463"
    - id: Label_marketing
      user_email: alpha.inbox@example.com
      name: Marketing
      color_background: "#FFE8D6"
      color_text: "#5A2B0C"
    - id: Label_receipts
      user_email: alpha.inbox@example.com
      name: Receipts
      color_background: "#E7F0FF"
      color_text: "#17345C"
    - id: Label_travel
      user_email: alpha.inbox@example.com
      name: Travel
      color_background: "#FFF7CC"
      color_text: "#4D3B00"
    - id: Label_ops
      user_email: beta.inbox@example.com
      name: Ops/Review
      color_background: "#DDEEFF"
      color_text: "#111111"
    - id: Label_customers
      user_email: beta.inbox@example.com
      name: Customers
      color_background: "#E0F7EC"
      color_text: "#0F3D2E"
    - id: Label_newsletters
      user_email: beta.inbox@example.com
      name: Newsletters
      color_background: "#F3E8FF"
      color_text: "#3D2463"
    - id: Label_marketing
      user_email: beta.inbox@example.com
      name: Marketing
      color_background: "#FFE8D6"
      color_text: "#5A2B0C"
    - id: Label_receipts
      user_email: beta.inbox@example.com
      name: Receipts
      color_background: "#E7F0FF"
      color_text: "#17345C"
    - id: Label_travel
      user_email: beta.inbox@example.com
      name: Travel
      color_background: "#FFF7CC"
      color_text: "#4D3B00"
  messages:
    - id: msg_alpha_release
      user_email: alpha.inbox@example.com
      from: ops@example.com
      to: alpha.inbox@example.com
      subject: Release checklist
      body_text: Please confirm archive, star, reply, snooze, and account switching before the screenshot build.
      label_ids: [INBOX, UNREAD, STARRED, Label_ops]
    - id: msg_alpha_support_escalations
      user_email: alpha.inbox@example.com
      from: support@example.com
      to: alpha.inbox@example.com
      subject: Escalation queue for Monday
      body_text: Six customer escalations are waiting for triage. Two mention sync delays and three ask about account switching.
      label_ids: [INBOX, UNREAD, Label_ops, Label_customers]
    - id: msg_alpha_design
      user_email: alpha.inbox@example.com
      from: design@example.com
      to: alpha.inbox@example.com
      subject: List view polish review
      body_text: The new list view needs stronger keyboard focus states before sign-off.
      label_ids: [INBOX, Label_ops]
    - id: msg_alpha_invoice
      user_email: alpha.inbox@example.com
      from: billing@example.com
      to: alpha.inbox@example.com
      subject: April infrastructure invoice
      body_text: The draft infrastructure invoice is ready for review.
      label_ids: [INBOX, Label_receipts]
    - id: msg_alpha_product_digest
      user_email: alpha.inbox@example.com
      from: digest@example.com
      to: alpha.inbox@example.com
      subject: Weekly product digest
      body_text: This week covers faster search, quieter notifications, and better keyboard navigation.
      label_ids: [INBOX, Label_newsletters]
    - id: msg_alpha_launch_assets
      user_email: alpha.inbox@example.com
      from: marketing@example.com
      to: alpha.inbox@example.com
      subject: Screenshot launch assets approved
      body_text: Final app screenshots, newsletter copy, and launch timing are approved.
      label_ids: [INBOX, UNREAD, Label_marketing]
    - id: msg_alpha_travel
      user_email: alpha.inbox@example.com
      from: travel@example.com
      to: alpha.inbox@example.com
      subject: Board meeting travel receipt
      body_text: Your receipt and itinerary for the board meeting trip are attached for reimbursement.
      label_ids: [INBOX, Label_travel, Label_receipts]
    - id: msg_alpha_customer
      user_email: alpha.inbox@example.com
      from: customer@example.com
      to: alpha.inbox@example.com
      subject: Customer rollout window
      body_text: Please confirm the rollout window, owner list, and rollback contact before tomorrow morning.
      label_ids: [INBOX, Label_customers]
    - id: msg_alpha_renewal
      user_email: alpha.inbox@example.com
      from: procurement@example.com
      to: alpha.inbox@example.com
      subject: Renewal negotiation notes
      body_text: Let's revisit the renewal terms after the stakeholder meeting.
      label_ids: [INBOX, Label_customers]
    - id: msg_alpha_security_archive
      user_email: alpha.inbox@example.com
      from: security@example.com
      to: alpha.inbox@example.com
      subject: Security report closed
      body_text: The quarterly security report is closed with no blocking issues.
      label_ids: [Label_ops]
    - id: msg_beta_vip_migration
      user_email: beta.inbox@example.com
      from: vip.customer@example.com
      to: beta.inbox@example.com
      subject: VIP migration timeline
      body_text: Please send the final migration timeline and owner list.
      label_ids: [INBOX, UNREAD, STARRED, Label_customers]
    - id: msg_beta_hiring
      user_email: beta.inbox@example.com
      from: recruiting@example.com
      to: beta.inbox@example.com
      subject: Hiring debrief
      body_text: Candidate feedback is in and we need a decision by end of day.
      label_ids: [INBOX, UNREAD, Label_ops]
    - id: msg_beta_investor_update
      user_email: beta.inbox@example.com
      from: founders@example.com
      to: beta.inbox@example.com
      subject: Investor update draft
      body_text: Can you tighten the product metrics section before tonight?
      label_ids: [INBOX, UNREAD, STARRED, Label_marketing]
    - id: msg_beta_campaign
      user_email: beta.inbox@example.com
      from: growth@example.com
      to: beta.inbox@example.com
      subject: Campaign performance snapshot
      body_text: The screenshot campaign outperformed the benchmark by 18 percent.
      label_ids: [INBOX, Label_marketing]
    - id: msg_beta_leadership_digest
      user_email: beta.inbox@example.com
      from: newsletter@example.com
      to: beta.inbox@example.com
      subject: Engineering leadership digest
      body_text: Decision logs, product strategy notes, and hiring benchmarks for the week.
      label_ids: [INBOX, Label_newsletters]
    - id: msg_beta_figma_receipt
      user_email: beta.inbox@example.com
      from: billing@figma.example.com
      to: beta.inbox@example.com
      subject: Figma invoice for April
      body_text: Your Figma invoice for April is available.
      label_ids: [INBOX, Label_receipts]
    - id: msg_beta_community
      user_email: beta.inbox@example.com
      from: community@example.com
      to: beta.inbox@example.com
      subject: "Community mention: keyboard shortcuts"
      body_text: A customer thread called out the new keyboard shortcuts and asked about account switching.
      label_ids: [INBOX, Label_customers]
    - id: msg_beta_board_packet
      user_email: beta.inbox@example.com
      from: board@example.com
      to: beta.inbox@example.com
      subject: Board packet edits
      body_text: The board packet edits can wait until the finance section lands.
      label_ids: [INBOX, Label_ops]
    - id: msg_beta_onboarding_archive
      user_email: beta.inbox@example.com
      from: people@example.com
      to: beta.inbox@example.com
      subject: Onboarding checklist completed
      body_text: Device setup, policy review, and manager syncs are all marked done.
      label_ids: [Label_ops]

