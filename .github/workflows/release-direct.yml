name: Direct Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APP_NAME: InboxZeroMail
      APP_DISPLAY_NAME: Inbox Zero
      SPARKLE_VERSION: 2.9.1
      XCODE_PROJECT: InboxZeroMail.xcodeproj
      XCODE_SCHEME: InboxZeroMail
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Validate tag matches app version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          app_version="$(xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings | awk '/MARKETING_VERSION = / { print $3; exit }')"
          if [[ "$tag_version" != "$app_version" ]]; then
            echo "Tag version ($tag_version) does not match MARKETING_VERSION ($app_version)."
            exit 1
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

      - name: Prepare notarization API key
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Archive signed app
        shell: bash
        env:
          INBOX_ZERO_GMAIL_CLIENT_ID: ${{ secrets.INBOX_ZERO_GMAIL_CLIENT_ID }}
          INBOX_ZERO_GMAIL_CLIENT_SECRET: ${{ secrets.INBOX_ZERO_GMAIL_CLIENT_SECRET }}
          SPARKLE_APPCAST_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/${APP_NAME}.xcarchive"
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "platform=macOS" \
            -archivePath "$archive_path" \
            DEVELOPMENT_TEAM=Z46U4K6CNL \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            INBOX_ZERO_GMAIL_CLIENT_ID="$INBOX_ZERO_GMAIL_CLIENT_ID" \
            INBOX_ZERO_GMAIL_CLIENT_SECRET="$INBOX_ZERO_GMAIL_CLIENT_SECRET" \
            SPARKLE_APPCAST_URL="$SPARKLE_APPCAST_URL" \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY"

      - name: Notarize and package app
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/${APP_NAME}.xcarchive"
          app_path="$archive_path/Products/Applications/${APP_NAME}.app"
          version="${GITHUB_REF_NAME#v}"
          unstapled_zip="$RUNNER_TEMP/${APP_NAME}-${version}-unstapled.zip"
          final_zip="$RUNNER_TEMP/${APP_NAME}-${version}.zip"

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$app_path" "$unstapled_zip"

          xcrun notarytool submit "$unstapled_zip" \
            --key "$RUNNER_TEMP/notary/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple -v "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vvv -t install "$app_path"

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$app_path" "$final_zip"
          echo "FINAL_ZIP=$final_zip" >> "$GITHUB_ENV"

      - name: Prepare release notes files
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archives_dir="$RUNNER_TEMP/appcast-archives"
          mkdir -p "$archives_dir"

          archive_basename="${APP_DISPLAY_NAME} ${version}.zip"
          release_notes_basename="${APP_DISPLAY_NAME} ${version}.md"
          cp "$FINAL_ZIP" "$archives_dir/$archive_basename"

          if [[ -f "release-notes/${GITHUB_REF_NAME}.md" ]]; then
            cp "release-notes/${GITHUB_REF_NAME}.md" "$archives_dir/$release_notes_basename"
            cp "release-notes/${GITHUB_REF_NAME}.md" "$RUNNER_TEMP/release-notes.md"
          elif [[ -f "release-notes/${version}.md" ]]; then
            cp "release-notes/${version}.md" "$archives_dir/$release_notes_basename"
            cp "release-notes/${version}.md" "$RUNNER_TEMP/release-notes.md"
          else
            printf '# %s %s\n\nSee the GitHub release for notes.\n' \
              "$APP_DISPLAY_NAME" \
              "$version" \
              > "$archives_dir/$release_notes_basename"
            printf '# %s %s\n\nRelease published from %s.\n' \
              "$APP_DISPLAY_NAME" \
              "$version" \
              "$GITHUB_REF_NAME" \
              > "$RUNNER_TEMP/release-notes.md"
          fi

          echo "APPCAST_ARCHIVES_DIR=$archives_dir" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" "$FINAL_ZIP" \
            --title "${APP_DISPLAY_NAME} ${GITHUB_REF_NAME#v}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Build Sparkle appcast tool
        shell: bash
        run: |
          set -euo pipefail
          sparkle_dir="$RUNNER_TEMP/Sparkle"
          git clone --depth 1 --branch "$SPARKLE_VERSION" https://github.com/sparkle-project/Sparkle "$sparkle_dir"
          xcodebuild \
            -scheme generate_appcast \
            -project "$sparkle_dir/Sparkle.xcodeproj" \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/SparkleDerivedData" \
            build

      - name: Generate and publish appcast
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          site_dir="$RUNNER_TEMP/gh-pages"
          appcast_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${{ github.event.repository.name }}/appcast.xml"
          download_url_prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/"
          release_notes_url_prefix="https://${GITHUB_REPOSITORY_OWNER}.github.io/${{ github.event.repository.name }}/release-notes/"
          generate_appcast_bin="$RUNNER_TEMP/SparkleDerivedData/Build/Products/Release/generate_appcast"

          if git clone --depth 1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$site_dir"; then
            true
          else
            mkdir -p "$site_dir"
            cd "$site_dir"
            git init -b gh-pages
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            touch .nojekyll
          fi

          mkdir -p "$site_dir/release-notes"
          touch "$site_dir/.nojekyll"
          if [[ -f "$site_dir/appcast.xml" ]]; then
            cp "$site_dir/appcast.xml" "$APPCAST_ARCHIVES_DIR/appcast.xml"
          fi

          echo "$SPARKLE_PRIVATE_KEY" | "$generate_appcast_bin" \
            --ed-key-file - \
            --download-url-prefix "$download_url_prefix" \
            --release-notes-url-prefix "$release_notes_url_prefix" \
            --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --maximum-deltas 0 \
            "$APPCAST_ARCHIVES_DIR"

          cp "$APPCAST_ARCHIVES_DIR/appcast.xml" "$site_dir/appcast.xml"
          find "$APPCAST_ARCHIVES_DIR" -maxdepth 1 -name '*.md' -exec cp {} "$site_dir/release-notes/" \;

          cd "$site_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll appcast.xml release-notes
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update appcast for ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
